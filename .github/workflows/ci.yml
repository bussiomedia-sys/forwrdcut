name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
      - name: Install package
        run: pip install -e . pytest
      - name: Unit + integration tests (incl. hermetic ffmpeg QC test)
        run: pytest -q
      - name: Syntax check examples
        run: python -m compileall -q examples
      - name: Lint (advisory)
        run: |
          pip install ruff
          ruff check src --exit-zero
