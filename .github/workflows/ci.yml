name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check (no heavy deps needed)
        run: python -m compileall -q src examples
      - name: Lint (advisory)
        run: |
          pip install ruff
          ruff check src --exit-zero
